databaseChangeLog:
  - changeSet:
      id: 1.1.7-create-table-services
      author: loubna
      changes:
        - createTable:
            tableName: services
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nom
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: division_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: services
            baseColumnNames: division_id
            referencedTableName: divisions
            referencedColumnNames: id
            constraintName: fk_services_division