databaseChangeLog:
  - changeSet:
      id: 1.1.6-create-table-divisions
      author: loubna
      changes:
        - createTable:
            tableName: divisions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nom
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: direction_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: divisions
            baseColumnNames: direction_id
            referencedTableName: directions
            referencedColumnNames: id
            constraintName: fk_divisions_direction