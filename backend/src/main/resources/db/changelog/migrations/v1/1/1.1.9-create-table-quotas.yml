databaseChangeLog:
  - changeSet:
      id: 1.1.9-create-table-quotas
      author: loubna
      changes:
        - createTable:
            tableName: quotas
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: annee
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: jours_alloues
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: jours_utilises
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: jours_restants
                  type: INT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: quotas
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_quotas_user

        - addUniqueConstraint:
            tableName: quotas
            columnNames: user_id, annee
            constraintName: uq_user_annee_quota