databaseChangeLog:
  - changeSet:
      id: 1.1.10-create-table-demandes
      author: loubna
      changes:
        - createTable:
            tableName: demandes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: interim_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: date_demande
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: date_debut
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: date_fin
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: duree
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: type_conge
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: statut
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: demandes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_demandes_user

        - addForeignKeyConstraint:
            baseTableName: demandes
            baseColumnNames: interim_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_demandes_interim