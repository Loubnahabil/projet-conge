version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gestion_conges_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin@123456"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin@123456' -Q 'SELECT 1' -No -C || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  maildev:
    image: maildev/maildev
    container_name: gestion_conges_maildev
    ports:
      - "1025:1025" # SMTP backend pipeline port
      - "1080:1080" # Web dashboard mail inbox UI
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local
